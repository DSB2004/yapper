syntax = "proto3";

package message;

import "common.proto";

service Message {
 rpc HealthCheck (common.HealthCheckRequest) returns (common.HealthCheckResponse);
  rpc GetMessages (GetMessageRequest) returns (GetMessageResponse);
  rpc GetUnreadCount (GetUnreadCountRequest) returns (GetUnreadCountResponse);
}

message GetUnreadCountRequest {
  string chatroom = 1;
  string userId=2;
}

message GetUnreadCountResponse {
  string message = 1;
  bool success = 2;
  int32 status = 3;
  int32 unreadCount=4;
}


message GetMessageRequest {
  string chatroom = 1;
  string userId=2;
}

message MessageAttachment {
  string url = 1;
  string filename = 2;
  int64 filesize = 3; 
}

message MessageReaction {
  string reaction = 1;
  string userId = 2; 
}
enum MessageType {
  GENERAL = 0;
  INFO = 1;
}

message MessagePayload {
  string publicId = 1;
  MessageType type = 2;
  repeated MessageAttachment attachments = 3;
  optional string text = 4;
  repeated string seen = 5;
  repeated string received = 6;
  bool isUpdated = 7;
  bool isStarred = 8;
  bool isPinned = 9;
  bool isDeleted=10;
  string chatroomId=11;
  string createdAt=12;
  string updatedAt=13;
  string by=14;
  repeated string for = 15;
  repeated MessageReaction reactions=16;
  bool isForwarded=17;
  bool isReply=18;
  optional string replyFor=19;
}

message GetMessageResponse {
  string message = 1;
  bool success = 2;
  int32 status = 3;
  repeated MessagePayload data = 4;
}