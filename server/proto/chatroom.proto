syntax = "proto3";

package chatroom;

import "common.proto";


service Chatroom {
  rpc HealthCheck (common.HealthCheckRequest) returns (common.HealthCheckResponse);
  rpc GetChatrooms(GetChatroomsRequest) returns (GetChatroomsResponse);
  rpc GetChatroomSummary(GetChatroomSummaryRequest)returns (GetChatroomSummaryResponse);
  rpc GetChatroom(GetChatroomRequest)returns (GetChatroomResponse);
  rpc CreateChatroom(CreateChatroomRequest) returns (CreateChatroomResponse);
  rpc GetChatroomIds(GetChatroomIdsRequest) returns (GetChatroomIdsResponse);
}
message GetChatroomIdsRequest {
  string userId = 1;
}

message ChatroomInfo{
 string chatroomId=1;
  bool isBlocked=2;
}
message GetChatroomIdsResponse{
  string message = 1;
  bool success = 2;
  repeated ChatroomInfo chatrooms=3;
}



message GetChatroomSummaryRequest {
  string chatroomId = 1;
   string userId = 2;
}
message GetChatroomSummaryResponse{
  string message = 1;
  bool success = 2;
  optional common.ChatroomSummary chatroom=3;
  int32 status = 4;
}


message GetChatroomsRequest {
  string userId = 1;
}
message GetChatroomsResponse{
  string message = 1;
  bool success = 2;
  repeated common.ChatroomSummary chats=3;
   int32 status = 4;
}


message GetChatroomRequest {
  string chatroomId = 1;
}

message GetChatroomResponse {
  string chatroomId = 1;
  repeated common.UserDetails participants = 2;
  string createdAt=3;
  common.UserDetails createdBy=4;
  optional string updatedAt=5;
  optional common.UserDetails updatedBy=6; 
  optional common.MessageSummary lastMessage = 7;
  optional string name = 8;
  optional string description = 9;
  optional string icon=10;
  string type=11;
  string message = 12;
  bool success = 13;
  bool isActive=14;
   int32 status = 15;
     string referenceId=16;
}


message CreateChatroomRequest {
  repeated string participants = 1;
  string createdBy=2;
  optional string name = 3;
  optional string description = 4;
  optional string icon=5;
  string type=6;
  string referenceId=7;
  
}

message CreateChatroomResponse {
 string message = 1;
  bool success = 2;
  string chatroomId = 3;
   int32 status = 4;
}

