syntax = "proto3";

package user;
import "common.proto";

service User {
  rpc HealthCheck (common.HealthCheckRequest) returns (common.HealthCheckResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GetUserByPhone(GetUserByPhoneRequest) returns (GetUserResponse);
  rpc GetUserById(GetUserByIdRequest) returns (GetUserResponse);
  rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);

  rpc CreateContact(CreateContactRequest) returns (CreateContactResponse);

  rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse);
  rpc UpdateGroup(UpdateGroupRequest) returns (UpdateGroupResponse);
  rpc AddGroupMember(AddGroupMemberRequest) returns (AddGroupMemberResponse);
  rpc RemoveGroupMember(RemoveGroupMemberRequest) returns (RemoveGroupMemberResponse);
  rpc LeaveGroup(LeaveGroupRequest) returns (LeaveGroupResponse);
}

// -------------------- User Messages --------------------
message GetUserRequest {
  string authId = 1;
}

message GetUserByIdRequest {
  string userId = 1;
}

message GetUserByPhoneRequest {
  string phone = 1;
}

message GetUserResponse {
  string userId = 1;
  string firstName = 2;
  string phone = 3;
  string avatar = 4;
  optional string bio = 5;
  bool success = 6;
  string message = 7;
  string lastName = 8;
   int32 status =10;
}


message GetUsersRequest {
  repeated string userIds = 1;
}

message GetUsersResponse {
  repeated common.UserDetails users = 1;
  bool success = 2;
  string message = 3;
   int32 status = 4;
}


message CreateUserRequest {
  string firstName = 1;
  string phone = 2;
  string avatar = 3;
  string authId = 4;
  string lastName = 5;
}

message CreateUserResponse {
  string authId = 1;
  bool success = 2;
  string message = 3;
  int32 status = 4;
}

message UpdateUserRequest {
  string authId = 1;
  string firstName = 2;
  string avatar = 3;
  string lastName = 4;
}

message UpdateUserResponse {
  bool success = 1;
  string message = 2;
  int32 status = 3;
}


message CreateContactRequest {
  string authId = 1; 
  string firstName = 2;
  string phone = 3;
  string lastName = 4;

  
}

message CreateContactResponse {
  string contactId = 1;
  bool success = 2;
  string message = 3;
  int32 status = 4;
  string chatroomId=5;
  string createdBy=6;
  optional  common.UserDetails other=7;
}

message BlockContactRequest {
  string chatroomId = 1;
  string authId=2;
}

message BlockContactResponse {
  string chatroomId = 1;
  bool success = 2;
  string message = 3;
  int32 status = 4;
}

// -------------------- Group Messages --------------------

message CreateGroupRequest {
  string name = 1;
  string description = 2;
  string icon = 3;
  repeated string members = 4;
  string authId=5;

}

message CreateGroupResponse {
  string groupId = 1;
  bool success = 2;
  string message = 3;
  int32 status = 4;
  string chatroomId=5;
  string createdBy=6;
}

message UpdateGroupRequest {
  string groupId = 1;
  string name = 2;
  string description = 3;
  string icon = 4;
  string authId=5;

}

message UpdateGroupResponse {
  bool success = 1;
  string message = 2;
   int32 status = 3;
}

message AddGroupMemberRequest {
  string groupId = 1;
  repeated string members = 2;
  string authId=3;
}

message AddGroupMemberResponse {
  bool success = 1;
  string message = 2;
   int32 status = 3;
}

message RemoveGroupMemberRequest {
  string groupId = 1;
  repeated string members = 2;
  string authId=3;
}

message RemoveGroupMemberResponse {
  bool success = 1;
  string message = 2;
   int32 status = 3;
}

message LeaveGroupRequest {
  string groupId = 1;
  string authId=2;
}

message LeaveGroupResponse {
  bool success = 1;
  string message = 2;
   int32 status = 3;
}